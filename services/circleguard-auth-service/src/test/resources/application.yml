spring:

  datasource:
    url: jdbc:postgresql://postgres:5432/circleguard
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
  
  ldap:
    urls: ldap://localhost:389
    base: dc=circleguard,dc=edu
    username: cn=admin,dc=circleguard,dc=edu
    password: admin

jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"
  expiration: 3600000

qr:
  secret: "my-qr-secret-key-for-dev-1234567890"
  expiration: 300

identity:
  service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083/api/v1/identities/map}

    ##jpa:
      ##hibernate:
        ##ddl-auto: none
    ##autoconfigure:
      ##exclude:
