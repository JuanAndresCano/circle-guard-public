spring:
  application:
    name: circleguard-gateway-service

  cloud:
    gateway:
      mvc:
        routes:

          - id: auth-service
            uri: ${AUTH_SERVICE_URL:http://localhost:8180}
            predicates:
              - Path=/api/v1/auth/**

          - id: identity-service
            uri: ${IDENTITY_SERVICE_URL:http://localhost:8083}
            predicates:
              - Path=/api/v1/identities/**

          - id: form-service
            uri: ${FORM_SERVICE_URL:http://localhost:8086}
            predicates:
              - Path=/api/v1/surveys/**

          - id: promotion-service
            uri: ${PROMOTION_SERVICE_URL:http://localhost:8088}
            predicates:
              - Path=/api/v1/mesh/**

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

server:
  port: 8087